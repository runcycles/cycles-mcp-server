name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    uses: runcycles/.github/.github/workflows/ci-typescript.yml@main

  publish:
    name: Publish to npm
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    concurrency:
      group: npm-publish
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 20 bundles npm 10.
      # Pinned to npm 11: npm 12 dropped Node 20 support, so @latest broke the
      # v0.4.0 publish with EBADENGINE.
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public

  smoke-test:
    name: Smoke Test Published Package
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Wait for npm propagation and run smoke test
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          for i in $(seq 1 30); do
            if npm view "@runcycles/mcp-server@$VERSION" version >/dev/null 2>&1; then
              break
            fi
            echo "Waiting for @runcycles/mcp-server@$VERSION on npm ($i/30)..."
            sleep 10
          done
          node scripts/smoke-test.mjs "$VERSION"

  publish-registry:
    name: Publish to MCP Registry
    needs: smoke-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc
      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish

  github-release:
    name: Create GitHub Release
    needs: publish-registry
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Create release with notes from CHANGELOG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/v}"

          # Skip cleanly if a release already exists (e.g. cut by hand earlier).
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "Release v$VERSION already exists — skipping."
            exit 0
          fi

          # Extract just the [VERSION] section of CHANGELOG.md (between
          # "## [VERSION]" and the next "## [...]"). Stops on next heading
          # or EOF, so it works for the most-recent entry too.
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)

          if [ -z "$(echo "$NOTES" | tr -d "[:space:]")" ]; then
            echo "No CHANGELOG entry for v$VERSION — falling back to auto-generated notes."
            gh release create "v$VERSION" --title "v$VERSION" --generate-notes
          else
            gh release create "v$VERSION" --title "v$VERSION" --notes "$NOTES"
          fi
